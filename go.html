<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mengalihkan ke Shopee...</title>
<style>
body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #f5f5f5; }
.loader { border: 4px solid #f3f3f3; border-top: 4px solid #ee4d2d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader"></div>
<h3>Mengalihkan ke Shopee...</h3>
<p style="color:#666;font-size:14px;">Tunggu sebentar ya</p>

<script>
// Step 1: Buka link afiliasi Bos (set cookie 30 hari)
// Step 2: Redirect ke search produk di Shopee

var keyword = decodeURIComponent(window.location.search.replace('?', '').split('=')[1] || '');
var searchUrl = keyword ? 'https://shopee.co.id/search?keyword=' + encodeURIComponent(keyword) : '';

// Buka link afiliasi Bos di tab background
if (keyword) {
    var a = document.createElement('a');
    a.href = 'https://s.shopee.co.id/4ftnloxacO';
    a.target = '_blank';
    a.rel = 'noopener';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    
    // Tunggu sebentar, lalu redirect ke search
    setTimeout(function() {
        window.location.href = searchUrl;
    }, 500);
} else {
    window.location.href = 'https://s.shopee.co.id/4ftnloxacO';
}
</script>
</body>
</html>
